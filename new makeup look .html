<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prakrati Makeup Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
              url('https://images.unsplash.com/photo-1600180758890-6b94519a8ba6?w=1600') no-repeat center/cover;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* MAIN CONTAINER */
.container {
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.08);
  border-radius: 25px;
  padding: 35px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  position: relative;
}

/* GOLD TOP LINE */
.container::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  width: 100%;
  background: linear-gradient(90deg,#FFD700,#FFA500,#FFD700);
}

/* LOGO */
.logo {
  font-size: 50px;
  margin-bottom: 10px;
}

/* BRAND */
.brand {
  font-family: 'Playfair Display', serif;
  font-size: 38px;
  color: #FFD700;
  margin-bottom: 5px;
}

.tagline {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 3px;
  color: #fff;
  margin-bottom: 20px;
}

/* IMAGE SECTION */
.hero-img {
  width: 100%;
  height: 180px;
  border-radius: 15px;
  background: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=800') no-repeat center/cover;
  margin-bottom: 20px;
  border: 2px solid rgba(255,215,0,0.3);
}

/* TEXT */
h2 {
  color: #fff;
  font-family: 'Playfair Display', serif;
  margin-bottom: 10px;
}

.subtitle {
  color: #ddd;
  font-size: 14px;
  margin-bottom: 25px;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 40px;
  border: none;
  margin: 10px 0;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.3s;
}

.review-btn {
  background: linear-gradient(135deg,#FFD700,#FFA500);
  color: black;
}

.review-btn:hover {
  transform: scale(1.05);
}

.coupon-btn {
  background: transparent;
  border: 2px solid #FFD700;
  color: #FFD700;
}

.timer {
  margin: 15px 0;
  color: #FFD700;
}

/* COUPON BOX */
#couponBox {
  display: none;
  margin-top: 20px;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(135deg,#000,#1a1a1a);
  border: 1px solid #FFD700;
}

.offer {
  font-size: 26px;
  color: #FFD700;
  margin: 15px 0;
}

.whatsapp-btn {
  background: #25D366;
  color: white;
}

/* MOBILE */
@media(max-width:400px){
  .container{
    padding:25px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">💄</div>

  <div class="brand">Prakrati</div>
  <div class="tagline">MAKEUP STUDIO</div>

  <div class="hero-img"></div>

  <h2>✨ Rate Your Experience</h2>
  <p class="subtitle">Give your royal feedback & unlock your exclusive bridal reward</p>

  <button class="btn review-btn" onclick="startReview()">Leave Review</button>

  <div id="timerText" class="timer"></div>

  <button id="couponBtn" class="btn coupon-btn" disabled onclick="showCoupon()">Unlock Reward 🎁</button>

  <div id="couponBox">
    <h3 style="color:white;">🎉 Congratulations</h3>

    <div class="offer">₹500 OFF Bridal Makeup</div>

    <p style="color:#ccc;">Valid for limited bookings</p>

    <button class="btn whatsapp-btn" onclick="bookWhatsApp()">Book on WhatsApp</button>
  </div>

</div>

<script>
let countdown = 10;
let interval;

function startReview(){
  window.open("https://maps.app.goo.gl/YyHPxvTozFDMuADG6","_blank");

  let timer = document.getElementById("timerText");
  let btn = document.getElementById("couponBtn");

  countdown = 10;
  btn.disabled = true;

  interval = setInterval(()=>{
    timer.innerHTML = "Wait " + countdown + " sec...";
    countdown--;

    if(countdown < 0){
      clearInterval(interval);
      timer.innerHTML = "✅ Reward unlocked!";
      btn.disabled = false;
    }
  },1000);
}

function showCoupon(){
  document.getElementById("couponBox").style.display = "block";
}

function bookWhatsApp(){
  let phone = "917985594790";
  let message = "Hello, I want to book bridal makeup.";
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
  window.open(url,"_blank");
}
</script>

</body>
</html>
